services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-homestop-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homestop_system_db}
      POSTGRES_USER: ${POSTGRES_USER:-homestop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homestop_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - homestop-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: ${APP_CONTAINER_NAME:-homestop-app}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-homestop_user}:${POSTGRES_PASSWORD:-homestop_password}@postgres:5432/${POSTGRES_DB:-homestop_system_db}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  homestop-postgres-data:
